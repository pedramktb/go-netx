name: Lint, Test and Build
permissions:
  contents: read
on:
  pull_request:
    branches: 
      - main
  push:
    branches:
      - main
    tags:
        - "cli/v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

jobs:
  lint-test-and-build:
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt update -y && sudo apt install -y gcc-x86-64-linux-gnu gcc-aarch64-linux-gnu gcc-mingw-w64-x86-64
      - name: Install llvm-mingw for Windows ARM64 cross-compilation
        env:
          LLVM_MINGW_VERSION: "20260421"
        run: |
          wget -q "https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_VERSION}/llvm-mingw-${LLVM_MINGW_VERSION}-msvcrt-ubuntu-22.04-x86_64.tar.xz"
          sudo mkdir -p /opt/llvm-mingw
          sudo tar -xf "llvm-mingw-${LLVM_MINGW_VERSION}-msvcrt-ubuntu-22.04-x86_64.tar.xz" -C /opt/llvm-mingw/
          BINDIR=$(find /opt/llvm-mingw -name "aarch64-w64-mingw32-clang" | head -1 | xargs dirname)
          if [ -z "$BINDIR" ]; then
            echo "error: aarch64-w64-mingw32-clang not found after extracting llvm-mingw"
            exit 1
          fi
          sudo ln -sf "$BINDIR"/aarch64-w64-mingw32-* /usr/local/bin/
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          version: 3.x
      - run: task deps
      - run: task lint
      - run: task test
      - run: task test:e2e:tun
      - run: task test:e2e:tun lib=true
      - run: task build
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ github.sha }}
          path: build/
          if-no-files-found: error
          retention-days: 7

  build-lib-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          version: 3.x
      - run: task deps

      - run: task build:lib:darwin
      - uses: actions/upload-artifact@v6
        with:
          name: darwin-${{ github.sha }}
          path: build/
          if-no-files-found: error
          retention-days: 7

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/cli/')
    runs-on: ubuntu-latest
    needs: [lint-test-and-build, build-lib-darwin]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: ${{ github.sha }}
          path: build
      - uses: actions/download-artifact@v8
        with:
          name: darwin-${{ github.sha }}
          path: build
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            build/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
